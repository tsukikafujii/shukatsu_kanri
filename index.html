<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📓</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>就活管理ダッシュボード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

  header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  header h1 { font-size: 22px; font-weight: 700; }
  header .date { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  .btn-add { background: #e94560; color: white; border: none; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-add:hover { background: #c73652; }

  .summary { display: flex; gap: 16px; padding: 24px 32px 0; flex-wrap: wrap; }
  .card { background: white; border-radius: 12px; padding: 16px 22px; flex: 1; min-width: 140px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .card .num { font-size: 28px; font-weight: 700; }
  .card.urgent .num { color: #e94560; }
  .card.active .num { color: #0a84ff; }
  .card.done .num { color: #30d158; }
  .card.total .num { color: #1a1a2e; }

  .filters { padding: 20px 32px 0; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 6px 16px; border-radius: 20px; border: 2px solid #ddd; background: white; font-size: 13px; cursor: pointer; font-weight: 500; }
  .filter-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
  .sort-label { margin-left: auto; font-size: 13px; color: #888; }
  select.sort-sel { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; background: white; cursor: pointer; }

  .table-wrap { padding: 20px 32px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  thead { background: #1a1a2e; color: white; }
  th { padding: 13px 16px; text-align: left; font-size: 13px; font-weight: 600; white-space: nowrap; }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8f9ff; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .s-es      { background: #fff3cd; color: #856404; }
  .s-submit  { background: #cfe2ff; color: #084298; }
  .s-doc     { background: #d1ecf1; color: #0c5460; }
  .s-int1    { background: #d4edda; color: #155724; }
  .s-int2    { background: #c3e6cb; color: #155724; }
  .s-int3    { background: #b1dfbb; color: #155724; }
  .s-offer   { background: #d0f0c0; color: #1a5c2a; }
  .s-ng      { background: #f8d7da; color: #842029; }
  .s-pass    { background: #e2e3e5; color: #41464b; }

  .days { font-weight: 700; padding: 3px 10px; border-radius: 20px; font-size: 13px; white-space: nowrap; }
  .days.red    { background: #fde8eb; color: #e94560; }
  .days.yellow { background: #fff8e1; color: #e6a817; }
  .days.green  { background: #e8f5e9; color: #2e7d32; }
  .days.gray   { background: #f0f0f0; color: #888; }
  .days.over   { background: #fde8eb; color: #999; text-decoration: line-through; }

  .btn-edit { background: none; border: 1px solid #ddd; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; color: #555; }
  .btn-edit:hover { background: #1a1a2e; color: white; border-color: #1a1a2e; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; justify-content: center; align-items: center; }
  .overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal h2 { font-size: 18px; margin-bottom: 24px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
  input[type=text], input[type=date], select, textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #1a1a2e; }
  textarea { resize: vertical; min-height: 72px; }
  .modal-btns { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
  .btn-cancel { padding: 10px 22px; border-radius: 8px; border: 1.5px solid #ddd; background: white; font-size: 14px; cursor: pointer; }
  .btn-save { padding: 10px 22px; border-radius: 8px; border: none; background: #1a1a2e; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
  .empty { text-align: center; padding: 48px; color: #bbb; font-size: 15px; }
  .company-name { font-weight: 600; font-size: 14px; }
  .company-type { font-size: 12px; color: #aaa; margin-top: 2px; }
  .no-action { color: #ccc; font-size: 13px; }
  .stars { color: #f5a623; font-size: 15px; letter-spacing: 2px; white-space: nowrap; }
  .stars.empty { color: #ddd; }
  .link-btn { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; text-decoration: none; white-space: nowrap; }
  .link-btn.mypage { background: #eef2ff; color: #4f46e5; }
  .link-btn.mypage:hover { background: #4f46e5; color: white; }
  .link-btn.folder { background: #fff7ed; color: #c2410c; }
  .link-btn.folder:hover { background: #c2410c; color: white; }
  .form-hint { font-size: 11px; color: #aaa; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>&#128203; 就活管理ダッシュボード</h1>
    <div class="date" id="today-label"></div>
  </div>
  <button class="btn-add" onclick="openModal()">&#xff0b; 企業を追加</button>
</header>

<div class="summary">
  <div class="card urgent"><div class="label">3日以内の締切</div><div class="num" id="cnt-urgent">0</div></div>
  <div class="card active"><div class="label">選考中</div><div class="num" id="cnt-active">0</div></div>
  <div class="card done"><div class="label">内定</div><div class="num" id="cnt-offer">0</div></div>
  <div class="card total"><div class="label">登録企業数</div><div class="num" id="cnt-total">0</div></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-btn" onclick="setFilter('es',this)">ES作成中</button>
  <button class="filter-btn" onclick="setFilter('submit',this)">提出済み</button>
  <button class="filter-btn" onclick="setFilter('doc',this)">書類選考中</button>
  <button class="filter-btn" onclick="setFilter('int',this)">面接中</button>
  <button class="filter-btn" onclick="setFilter('offer',this)">内定</button>
  <button class="filter-btn" onclick="setFilter('ng',this)">不合格</button>
  <span class="sort-label">並び順：</span>
  <select class="sort-sel" onchange="setSort(this.value)">
    <option value="deadline">ES締切が近い順</option>
    <option value="action">アクション期限順</option>
    <option value="star">志望度が高い順</option>
    <option value="company">企業名順</option>
    <option value="added">追加順</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>企業名</th>
        <th>ステータス</th>
        <th>志望度</th>
        <th>ES締切</th>
        <th>次のアクション</th>
        <th>アクション期限</th>
        <th>メモ</th>
        <th>資料</th>
        <th>マイページ</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<div class="overlay" id="overlay" onclick="closeIfOverlay(event)">
  <div class="modal">
    <h2 id="modal-title">企業を追加</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label>企業名 *</label><input type="text" id="f-company" placeholder="例：〇〇株式会社"></div>
    <div class="form-group"><label>業界・職種</label><input type="text" id="f-type" placeholder="例：IT・エンジニア職"></div>
    <div class="form-group"><label>ステータス</label>
      <select id="f-status">
        <option value="es">ES作成中</option>
        <option value="submit">ES提出済み</option>
        <option value="doc">書類選考中</option>
        <option value="int1">一次面接</option>
        <option value="int2">二次面接</option>
        <option value="int3">最終面接</option>
        <option value="offer">内定</option>
        <option value="ng">不合格</option>
        <option value="pass">辞退</option>
      </select>
    </div>
    <div class="form-group"><label>志望度</label>
      <select id="f-star">
        <option value="0">未設定</option>
        <option value="1">★☆☆☆☆</option>
        <option value="2">★★☆☆☆</option>
        <option value="3">★★★☆☆</option>
        <option value="4">★★★★☆</option>
        <option value="5">★★★★★</option>
      </select>
    </div>
    <div class="form-group"><label>ES締切日</label><input type="date" id="f-deadline"></div>
    <div class="form-group"><label>次のアクション</label><input type="text" id="f-action" placeholder="例：志望動機を書く"></div>
    <div class="form-group"><label>アクション期限日</label><input type="date" id="f-action-date"></div>
    <div class="form-group"><label>メモ</label><textarea id="f-memo" placeholder="自由記入"></textarea></div>
    <div class="form-group">
      <label>&#128194; 資料フォルダURL（Google Drive）</label>
      <input type="text" id="f-folder" placeholder="Google DriveフォルダのURLを貼り付け">
      <div class="form-hint">Google Drive でフォルダを右クリック →「リンクをコピー」して貼り付け</div>
    </div>
    <div class="form-group"><label>マイページURL</label><input type="text" id="f-mypage" placeholder="例：https://job.mynavi.jp/..."></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveEntry()">保存</button>
    </div>
  </div>
</div>

<script>
const ST = {
  es:     {label:'ES作成中',   cls:'s-es'},
  submit: {label:'ES提出済み', cls:'s-submit'},
  doc:    {label:'書類選考中', cls:'s-doc'},
  int1:   {label:'一次面接',   cls:'s-int1'},
  int2:   {label:'二次面接',   cls:'s-int2'},
  int3:   {label:'最終面接',   cls:'s-int3'},
  offer:  {label:'内定',       cls:'s-offer'},
  ng:     {label:'不合格',     cls:'s-ng'},
  pass:   {label:'辞退',       cls:'s-pass'},
};

let data = JSON.parse(localStorage.getItem('shukatsu') || '[]');
let filt = 'all', srt = 'deadline';

const today = new Date(); today.setHours(0,0,0,0);
document.getElementById('today-label').textContent =
  today.getFullYear()+'年'+(today.getMonth()+1)+'月'+today.getDate()+'日';

const save = () => localStorage.setItem('shukatsu', JSON.stringify(data));

function diff(d) {
  if (!d) return null;
  const dt = new Date(d); dt.setHours(0,0,0,0);
  return Math.round((dt - today) / 86400000);
}

function tag(n) {
  if (n===null) return '<span class="days gray">未設定</span>';
  if (n<0)  return '<span class="days over">期限切れ</span>';
  if (n===0) return '<span class="days red">今日！</span>';
  if (n<=3)  return '<span class="days red">あと '+n+' 日</span>';
  if (n<=7)  return '<span class="days yellow">あと '+n+' 日</span>';
  return '<span class="days green">あと '+n+' 日</span>';
}

function starTag(n) {
  n = +n || 0;
  if (n===0) return '<span class="stars empty">☆☆☆☆☆</span>';
  return '<span class="stars">'+'★'.repeat(n)+'☆'.repeat(5-n)+'</span>';
}

function fmt(d) { if(!d) return ''; const p=d.split('-'); return p[1]+'/'+p[2]; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setFilter(f,btn) {
  filt=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function setSort(s){srt=s;render();}

function getList() {
  let list = data.filter(e => {
    if (filt==='all') return true;
    if (filt==='int') return ['int1','int2','int3'].includes(e.status);
    return e.status===filt;
  });
  return list.sort((a,b)=>{
    if(srt==='deadline') return (a.deadline||'9999').localeCompare(b.deadline||'9999');
    if(srt==='action')   return (a.actionDate||'9999').localeCompare(b.actionDate||'9999');
    if(srt==='company')  return a.company.localeCompare(b.company,'ja');
    if(srt==='star')     return (+b.star||0) - (+a.star||0);
    return a._id-b._id;
  });
}

function render() {
  const tbody = document.getElementById('table-body');
  const list = getList();

  document.getElementById('cnt-total').textContent = data.length;
  document.getElementById('cnt-active').textContent = data.filter(e=>['doc','int1','int2','int3'].includes(e.status)).length;
  document.getElementById('cnt-offer').textContent = data.filter(e=>e.status==='offer').length;
  document.getElementById('cnt-urgent').textContent = data.filter(e=>{
    const d1=diff(e.deadline),d2=diff(e.actionDate);
    return (d1!==null&&d1>=0&&d1<=3)||(d2!==null&&d2>=0&&d2<=3);
  }).length;

  if (!list.length) {
    tbody.innerHTML='<tr><td colspan="10" class="empty">企業を追加してください</td></tr>';
    return;
  }

  tbody.innerHTML = list.map(e => {
    const st = ST[e.status]||{label:e.status,cls:''};
    return '<tr>' +
      '<td><div class="company-name">'+esc(e.company)+'</div>'+(e.type?'<div class="company-type">'+esc(e.type)+'</div>':'')+'</td>' +
      '<td><span class="badge '+st.cls+'">'+st.label+'</span></td>' +
      '<td>'+starTag(e.star)+'</td>' +
      '<td>'+(e.deadline?'<div style="font-size:12px;color:#888">'+fmt(e.deadline)+'</div>':'')+tag(diff(e.deadline))+'</td>' +
      '<td>'+(e.action?esc(e.action):'<span class="no-action">—</span>')+'</td>' +
      '<td>'+(e.actionDate?'<div style="font-size:12px;color:#888">'+fmt(e.actionDate)+'</div>':'')+tag(diff(e.actionDate))+'</td>' +
      '<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:#777">'+esc(e.memo||'—')+'</td>' +
      '<td>'+(e.folder?'<a class="link-btn folder" href="'+esc(e.folder)+'" target="_blank" rel="noopener">&#128194; 開く</a>':'<span class="no-action">—</span>')+'</td>' +
      '<td>'+(e.mypage?'<a class="link-btn mypage" href="'+esc(e.mypage)+'" target="_blank" rel="noopener">開く</a>':'<span class="no-action">—</span>')+'</td>' +
      '<td><button class="btn-edit" onclick="openEdit('+e._id+')">編集</button></td>' +
    '</tr>';
  }).join('');
}

let nextId = data.length ? Math.max(...data.map(e=>e._id))+1 : 1;

function openModal() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal-title').textContent='企業を追加';
  document.getElementById('edit-id').value='';
  ['f-company','f-type','f-action','f-memo','f-folder','f-mypage'].forEach(i=>document.getElementById(i).value='');
  ['f-deadline','f-action-date'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('f-status').value='es';
  document.getElementById('f-star').value='0';
}

function openEdit(id) {
  const e = data.find(x=>x._id===id); if(!e) return;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal-title').textContent='企業を編集';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-company').value=e.company;
  document.getElementById('f-type').value=e.type||'';
  document.getElementById('f-status').value=e.status;
  document.getElementById('f-star').value=e.star||'0';
  document.getElementById('f-deadline').value=e.deadline||'';
  document.getElementById('f-action').value=e.action||'';
  document.getElementById('f-action-date').value=e.actionDate||'';
  document.getElementById('f-memo').value=e.memo||'';
  document.getElementById('f-folder').value=e.folder||'';
  document.getElementById('f-mypage').value=e.mypage||'';
}

function closeModal(){document.getElementById('overlay').classList.remove('open');}
function closeIfOverlay(ev){if(ev.target===document.getElementById('overlay'))closeModal();}

function saveEntry() {
  const company = document.getElementById('f-company').value.trim();
  if (!company){alert('企業名を入力してください');return;}
  const entry = {
    company, type:document.getElementById('f-type').value.trim(),
    status:document.getElementById('f-status').value,
    star:document.getElementById('f-star').value,
    deadline:document.getElementById('f-deadline').value,
    action:document.getElementById('f-action').value.trim(),
    actionDate:document.getElementById('f-action-date').value,
    memo:document.getElementById('f-memo').value.trim(),
    folder:document.getElementById('f-folder').value.trim(),
    mypage:document.getElementById('f-mypage').value.trim(),
  };
  const eid = document.getElementById('edit-id').value;
  if (eid) {
    const idx=data.findIndex(x=>x._id===Number(eid));
    if(idx!==-1) data[idx]={...data[idx],...entry};
  } else {
    entry._id=nextId++; data.push(entry);
  }
  save(); render(); closeModal();
}

if (data.length===0) {
  [{company:'〇〇テクノロジー株式会社',type:'IT・エンジニア職',status:'es',star:'4',deadline:'2026-05-20',action:'志望動機を書く',actionDate:'2026-05-15',memo:'OB訪問済み',folder:'',mypage:''},
   {company:'△△商事株式会社',type:'商社・営業職',status:'doc',star:'3',deadline:'2026-05-25',action:'面接対策',actionDate:'2026-05-18',memo:'',folder:'',mypage:''},
   {company:'□□フィナンシャル',type:'金融・総合職',status:'int1',star:'5',deadline:'',action:'一次面接の準備',actionDate:'2026-05-14',memo:'5/15 10:00 オンライン面接',folder:'',mypage:''}
  ].forEach((s,i)=>{s._id=i+1;data.push(s);});
  nextId=data.length+1; save();
}
render();
</script>
</body>
</html>
